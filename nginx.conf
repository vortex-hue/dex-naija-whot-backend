# Nginx reverse proxy configuration for WhotChain Backend
# Place this in /etc/nginx/sites-available/whotchain-api
# Then: ln -s /etc/nginx/sites-available/whotchain-api /etc/nginx/sites-enabled/

upstream whotchain_backend {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 80;
    server_name api.whotchain.xyz;  # Change to your domain

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.whotchain.xyz;  # Change to your domain

    # SSL certificates (use certbot/Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.whotchain.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.whotchain.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ─── WebSocket support (Socket.io) ───
    location /socket.io/ {
        proxy_pass http://whotchain_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # WebSocket timeouts (keep connections alive)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── REST API endpoints ───
    location /api/ {
        proxy_pass http://whotchain_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # CORS headers (handled by Express, but backup)
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, x-api-key" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ─── Health check / root ───
    location / {
        proxy_pass http://whotchain_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Security headers ───
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Logging ───
    access_log /var/log/nginx/whotchain-api.access.log;
    error_log /var/log/nginx/whotchain-api.error.log;
}
